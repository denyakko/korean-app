<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="한국어ノート">
<meta name="theme-color" content="#f7f3ef">
<title>한국어 学習ノート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ===== Korean Cafe Natural Design ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f7f3ef;color:#2d2420;font-family:'Klee One','Noto Sans KR',cursive;min-height:100vh;overflow-x:hidden;font-weight:600}
input,button,label,select{font-family:'Klee One','Noto Sans KR',cursive}
/* 背景デコ */
.bg1{position:fixed;top:-100px;right:-60px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(255,192,168,.2) 0%,transparent 65%);pointer-events:none;z-index:0}
.bg2{position:fixed;bottom:-80px;left:-60px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,150,.15) 0%,transparent 65%);pointer-events:none;z-index:0}
/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 12px;position:relative;z-index:1}
.logo{font-size:20px;font-weight:900;background:linear-gradient(135deg,#d4826a,#c4956a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:12px;color:#a08070;font-weight:700}
.word-count{font-size:13px;color:#7a5848;font-weight:700;background:#ede8e3;padding:4px 14px;border-radius:20px;border:1px solid #ddd5cc}
/* Nav */
nav{display:flex;gap:4px;padding:0 16px 14px;position:relative;z-index:1}
.tab-btn{flex:1;padding:10px 0;border-radius:12px;border:none;background:transparent;color:#8a6050;font-weight:900;font-size:13px;cursor:pointer;transition:all .2s}
.tab-btn.active{background:linear-gradient(135deg,#d4826a,#c4956a);color:#fff;box-shadow:0 4px 12px rgba(212,130,106,.3)}
main{padding:0 16px 40px;position:relative;z-index:1}
.section{display:none}.section.active{display:block}
/* Cards */
.card{background:#fff;border-radius:20px;padding:20px 18px;margin-bottom:16px;border:1px solid #ede8e3;box-shadow:0 2px 12px rgba(180,140,120,.08)}
.card-sm{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:16px;border:1px solid #ede8e3;box-shadow:0 2px 8px rgba(180,140,120,.06)}
.card-title{font-weight:700;font-size:16px;margin-bottom:14px;color:#2d2420}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
label.field-label{font-size:12px;color:#a08070;font-weight:700;letter-spacing:.06em}
input[type=text],input[type=date],input[type=number],select{background:#f7f3ef;border:1.5px solid #e0d8d0;border-radius:12px;padding:10px 14px;color:#2d2420;font-size:15px;outline:none;width:100%;font-weight:600}
input[type=text]:focus,input[type=date]:focus,input[type=number]:focus,select:focus{border-color:#d4826a;background:#fff}
input[type=number]{width:80px}
select option{background:#fff;color:#2d2420}
/* Buttons */
.btn-primary{background:linear-gradient(135deg,#d4826a,#c4956a);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 12px rgba(212,130,106,.25);transition:all .2s}
.btn-ghost{background:transparent;color:#a08070;border:1.5px solid #e0d8d0;border-radius:12px;padding:12px 24px;font-weight:600;font-size:14px;cursor:pointer}
.btn-sm{background:rgba(255,255,255,.12);color:#d4b8a8;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:600}
.btn-danger{background:#fef0ee;color:#c0504a;border:1px solid #f8d0cc}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
/* Category chips */
.cat-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid #e0d8d0;background:#f7f3ef;color:#7a5848;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.cat-chip.active{background:linear-gradient(135deg,#d4826a,#c4956a);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(212,130,106,.25)}
/* Level summary */
.level-summary{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.level-chip{display:flex;align-items:center;gap:5px;background:#f7f3ef;border:1.5px solid #e0d8d0;border-radius:20px;padding:6px 12px;cursor:pointer;transition:all .2s;font-size:14px;font-weight:700}
.search-wrap{display:flex;align-items:center;gap:8px;background:#fff;border-radius:14px;padding:11px 16px;margin-bottom:12px;border:1.5px solid #e0d8d0;box-shadow:0 2px 8px rgba(180,140,120,.06)}
.search-wrap input{background:transparent;border:none;outline:none;color:#2d2420;font-size:15px;flex:1;font-weight:600}
/* Lesson Notes */
.note-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #ede8e3;border-left:3px solid #d4826a;box-shadow:0 2px 8px rgba(180,140,120,.06)}
.note-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.note-date{font-size:12px;color:#d4826a;font-weight:700}
.note-theme{font-size:15px;font-weight:700;color:#2d2420;margin-bottom:6px}
.note-body{font-size:14px;color:#7a6050;line-height:1.7;white-space:pre-wrap;font-weight:600}
.note-words{margin-top:10px;padding-top:10px;border-top:1px solid #f0e8e0}
.note-words-title{font-size:11px;color:#64748b;font-weight:700;margin-bottom:6px}
.note-word-chip{display:inline-block;background:#fdf0eb;color:#c4724a;font-size:12px;padding:2px 8px;border-radius:10px;margin:2px;border:1px solid #f0d8cc}
textarea{background:#f7f3ef;border:1.5px solid #e0d8d0;border-radius:12px;padding:10px 14px;color:#2d2420;font-size:15px;outline:none;width:100%;resize:vertical;min-height:100px;font-family:'Klee One','Noto Sans KR',cursive;line-height:1.6}
/* Paging */
.paging-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.page-btn{background:#f7f3ef;border:1px solid #e0d8d0;color:#a08070;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer}
.page-btn.active{background:linear-gradient(135deg,#d4826a,#c4956a);color:#fff;border-color:transparent}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-info{font-size:13px;color:#b09080}
.stamp-btn{background:transparent;border:none;cursor:pointer;font-size:20px;padding:3px;border-radius:8px;transition:all .15s;line-height:1}
.stamp-btn.active{transform:scale(1.2)}
.speak-btn{background:transparent;border:none;cursor:pointer;font-size:18px;padding:2px 4px;border-radius:6px;line-height:1;transition:transform .15s;flex-shrink:0}
.lf-scroll{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.lf-btn{padding:7px 14px;border-radius:20px;border:2px solid #e0d8d0;background:#f7f3ef;color:#a08070;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.lf-btn.active{background:linear-gradient(135deg,#c4724a,#d4956a);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(196,114,74,.35);font-weight:700}
.mode-btns{display:flex;gap:0;margin-bottom:16px;background:#f0ebe5;border-radius:14px;padding:4px}
.mode-btn{flex:1;padding:11px 8px;border-radius:10px;border:none;background:transparent;color:#b09080;font-weight:700;font-size:13px;cursor:pointer;transition:all .25s;line-height:1.4;font-family:'Klee One',cursive;white-space:nowrap;overflow:hidden}
.mode-btn.active{background:#fff;color:#c4724a;box-shadow:0 2px 8px rgba(196,114,74,.2);font-weight:900}
.listen-play-btn{background:linear-gradient(135deg,#d4826a,#c4956a);border:none;border-radius:50%;width:80px;height:80px;font-size:32px;cursor:pointer;box-shadow:0 4px 16px rgba(212,130,106,.4);transition:transform .15s}
.listen-play-btn:active{transform:scale(.95)}
.streak-box{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#d4826a,#c4956a);border-radius:16px;padding:14px 18px;margin-bottom:16px;box-shadow:0 4px 12px rgba(212,130,106,.25)}
.streak-fire{font-size:36px;line-height:1}
.streak-num{font-size:40px;font-weight:900;color:#fff;line-height:1}
.streak-label{font-size:13px;color:rgba(255,255,255,.85);font-weight:600}
.streak-best{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.graph-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:80px;margin:12px 0}
.graph-bar{flex:1;border-radius:6px 6px 0 0;transition:height .4s ease;min-height:4px}
.graph-label{display:flex;gap:4px;justify-content:space-between}
.graph-label span{flex:1;text-align:center;font-size:10px;color:#a08070}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 24px;border-radius:12px;font-weight:700;font-size:14px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:nowrap;display:none;transition:opacity .3s}
</style>
</head>
<body>
<div class="bg1"></div><div class="bg2"></div>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <svg width="44" height="44" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="10" cy="13" r="8" fill="#c8905a"/>
      <circle cx="38" cy="13" r="8" fill="#c8905a"/>
      <circle cx="10" cy="13" r="5" fill="#d4a870"/>
      <circle cx="38" cy="13" r="5" fill="#d4a870"/>
      <circle cx="24" cy="26" r="18" fill="#d4a870"/>
      <ellipse cx="24" cy="31" rx="8" ry="5.5" fill="#e0c090"/>
      <ellipse cx="15" cy="29" rx="4" ry="3" fill="#f4a0a0" opacity="0.6"/>
      <ellipse cx="33" cy="29" rx="4" ry="3" fill="#f4a0a0" opacity="0.6"/>
      <circle cx="19" cy="24" r="3" fill="#1a0a00"/>
      <circle cx="20.1" cy="22.9" r="1" fill="white"/>
      <circle cx="29" cy="24" r="3" fill="#1a0a00"/>
      <circle cx="30.1" cy="22.9" r="1" fill="white"/>
      <ellipse cx="24" cy="30" rx="2.5" ry="1.8" fill="#1a0a00"/>
      <path d="M21 33 Q24 36.5 27 33" stroke="#1a0a00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </svg>
    <div style="display:flex;flex-direction:column;line-height:1.2;align-items:center;text-align:center">
      <span class="logo">나만의 단어장</span>
      <span class="logo-sub">自分色に育てよう</span>
    </div>
    <span style="font-size:26px;line-height:1">🌱</span>
  </div>
  <div class="word-count" id="wordCount">0語</div>
</header>

<nav>
  <button class="tab-btn active" onclick="switchTab('vocab')">単語帳</button>
  <button class="tab-btn" onclick="switchTab('test')">テスト</button>
  <button class="tab-btn" onclick="switchTab('record')">記録</button>
  <button class="tab-btn" onclick="switchTab('notes')">ノート</button>
  <button class="tab-btn" onclick="switchTab('listen')">聴く</button>
</nav>

<main>
<!-- ===== 単語帳 ===== -->
<div id="sec-vocab" class="section active">

  <!-- カテゴリ横スクロール -->
  <div class="cat-scroll" id="catScroll"></div>

  <!-- 習熟度フィルター -->
  <div class="level-summary" id="levelSummary"></div>

  <!-- 入力フォーム -->
  <div class="card">
    <div class="card-title" id="formTitle">＋ 単語を追加</div>
    <div class="form-group">
      <label class="field-label">韓国語 *</label>
      <input type="text" id="fKorean" placeholder="예: 안녕하세요">
    </div>
    <div class="form-group"><label class="field-label">日本語訳 *</label><input type="text" id="fJapanese" placeholder="例: こんにちは"></div>
    <div class="form-group"><label class="field-label">メモ</label><input type="text" id="fMemo" placeholder="用法・例文など"></div>
    <div class="form-group">
      <label class="field-label">カテゴリ</label>
      <select id="fCategory"></select>
    </div>
    <div class="form-group"><label class="field-label">学習日</label><input type="date" id="fDate"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="handleSave()" id="saveBtn">追加する</button>
      <button class="btn-ghost" onclick="cancelEdit()" id="cancelBtn" style="display:none">キャンセル</button>
    </div>
  </div>

  <!-- 検索 -->
  <div class="search-wrap">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="検索…" oninput="renderWords()">
  </div>

  <div class="word-list" id="wordList"></div>

  <!-- カテゴリ管理 -->
  <div class="card-sm" style="margin-top:16px">
    <div style="font-size:13px;color:#94a3b8;font-weight:700;margin-bottom:8px">🗂 カテゴリ管理</div>
    <div class="cat-manage-row">
      <input type="text" id="newCatInput" placeholder="新しいカテゴリ名" style="font-size:13px;padding:7px 12px">
      <button class="btn-sm" onclick="addCategory()" style="white-space:nowrap;flex-shrink:0">追加</button>
    </div>
    <div class="cat-list" id="catList"></div>
  </div>

  <!-- バックアップ -->
  <div class="card-sm" style="margin-top:8px">
    <div class="backup-row">
      <span style="font-size:13px;color:#94a3b8;font-weight:700">💾 バックアップ</span>
      <div style="display:flex;gap:8px">
        <button class="btn-sm" onclick="exportData()">書き出し</button>
        <label class="btn-sm" style="cursor:pointer">読み込み<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
      </div>
    </div>
    <div style="font-size:11px;color:#c0a898;margin-top:5px;opacity:.8">機種変前に「書き出し」→ 新スマホで「読み込み」でデータ移行できます</div>
  </div>
</div>

<!-- ===== テスト ===== -->
<div id="sec-test" class="section">
  <div id="testSetup" class="card">
    <div class="card-title">📝 テストモード選択</div>
    <p style="color:#94a3b8;font-size:14px;margin-bottom:16px">出題方向・カテゴリ・習熟度を選んでください。</p>
    <div class="mode-btns">
      <button class="mode-btn active" id="modeJK" onclick="setTestMode('ja2ko')">🇯🇵 日本語 → 韓国語</button>
      <button class="mode-btn" id="modeKJ" onclick="setTestMode('ko2ja')">🇰🇷 韓国語 → 日本語</button>
    </div>
    <div class="form-group">
      <label class="field-label">カテゴリ</label>
      <div class="lf-scroll" id="testCatFilters"></div>
    </div>
    <div class="form-group" style="margin-top:8px">
      <label class="field-label">習熟度</label>
      <div class="lf-scroll" id="levelFilters"></div>
    </div>
    <div class="form-group" style="margin-top:12px">
      <label class="field-label">出題数</label>
      <input type="number" id="testCount" value="10" min="1">
    </div>
    <div class="btn-row"><button class="btn-primary" onclick="startTest()">テスト開始</button></div>
  </div>

  <div id="testQ" class="card" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="test-counter" id="testCounter"></div>
    <div class="test-q-row">
      <div class="test-question" id="testQuestion"></div>
      <button class="speak-btn" id="testSpeakBtn" onclick="speakTest()" style="font-size:22px;display:none">🔈</button>
    </div>
    <div class="test-memo" id="testMemo"></div>
    <input type="text" class="test-input" id="testInput" placeholder="韓国語を入力…" onkeydown="testKeydown(event)">
    <div class="btn-row"><button class="btn-primary" id="testActionBtn" onclick="testAction()" style="width:100%">答え合わせ</button></div>
    <div id="resultBanner" class="result-banner" style="display:none">
      <span id="resultText"></span>
      <button class="speak-btn" id="resultSpeakBtn" onclick="speakResult()" style="display:none">🔈</button>
    </div>
    <div id="selfJudgeRow" style="display:none;gap:8px;margin-top:10px">
      <button onclick="selfJudge(true)" style="flex:1;padding:12px;border-radius:10px;border:none;background:#5a9e6a;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Klee One',cursive">⭕ 合ってた</button>
      <button onclick="selfJudge(false)" style="flex:1;padding:12px;border-radius:10px;border:none;background:#c04040;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Klee One',cursive">❌ 違った</button>
    </div>
    <div class="btn-row" id="nextBtnRow" style="display:none">
      <button class="btn-primary" onclick="nextQuestion()" style="width:100%">次へ →</button>
    </div>
  </div>

  <div id="testDone" class="card" style="display:none">
    <div class="card-title">🎉 結果</div>
    <div class="score-box">
      <div class="score-pct" id="scorePct"></div>
      <div class="score-detail" id="scoreDetail"></div>
      <div class="score-note">習熟度が自動更新されました</div>
    </div>
    <div id="wrongSection" class="wrong-list"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="resetTest()">もう一度</button>
      <button class="btn-ghost" onclick="switchTab('vocab')">単語帳へ</button>
    </div>
  </div>
</div>

<!-- ===== 記録 ===== -->
<div id="sec-record" class="section">
  <div class="card">
    <div class="card-title">📊 習熟度まとめ</div>
    <div id="statChips" class="stat-chips"></div>
    <div class="level-bar" id="levelBar"></div>
  </div>
  <div class="card">
    <div class="card-title">📅 日付別まとめ</div>
    <div id="recordList"></div>
  </div>
</div>

<!-- ===== レッスンノート ===== -->
<div id="sec-notes" class="section">
  <div class="card">
    <div class="card-title" id="noteFormTitle">📝 レッスンノートを追加</div>
    <div class="form-group"><label class="field-label">レッスン日</label><input type="date" id="nDate"></div>
    <div class="form-group"><label class="field-label">テーマ・トピック</label><input type="text" id="nTheme" placeholder="例：敬語、買い物の表現、発音練習"></div>
    <div class="form-group">
      <label class="field-label">気づいたこと・メモ</label>
      <textarea id="nBody" placeholder="レッスンで気づいたこと、難しかった表現、次回やりたいことなど…"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveNote()" id="noteSaveBtn">保存する</button>
      <button class="btn-ghost" onclick="cancelNote()" id="noteCancelBtn" style="display:none">キャンセル</button>
    </div>
  </div>
  <div id="noteList"></div>
</div>

<!-- ===== 聴く ===== -->
<div id="sec-listen" class="section">

  <!-- リスニングクイズ -->
  <div class="card" id="listenQuizCard">
    <div class="card-title">🎧 リスニングクイズ</div>
    <p style="font-size:13px;color:#a08070;margin-bottom:14px">音声を聞いて日本語訳を答えます。テキストは表示されません。</p>
    <div id="listenQuizSetup">
      <div class="form-group">
        <label class="field-label">カテゴリ</label>
        <div class="lf-scroll" id="listenCatFilter"></div>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label class="field-label">出題数</label>
        <input type="number" id="listenCount" value="10" min="1" style="width:80px">
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="startListenQuiz()">クイズ開始</button>
      </div>
    </div>
    <div id="listenQuizMain" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="listenProgress" style="width:0%"></div></div>
      <div class="test-counter" id="listenCounter"></div>
      <div style="text-align:center;margin:24px 0">
        <button id="listenPlayBtn" onclick="playListenWord()" style="background:linear-gradient(135deg,#d4826a,#c4956a);border:none;border-radius:50%;width:80px;height:80px;font-size:32px;cursor:pointer;box-shadow:0 4px 16px rgba(212,130,106,.4)">🔈</button>
        <div style="font-size:13px;color:#a08070;margin-top:8px">タップして再生</div>
      </div>
      <div style="text-align:center;color:#a08070;font-size:13px;margin-bottom:8px">頭の中で意味を考えてみましょう</div>
      <div class="btn-row">
        <button class="btn-primary" id="listenActionBtn" onclick="showListenAnswer()" style="width:100%">答えを見る</button>
      </div>
      <div id="listenResultBanner" style="display:none" class="result-banner"></div>
      <div id="listenSelfJudge" style="display:none;gap:8px;margin-top:10px">
        <button onclick="listenSelfJudge(true)" style="flex:1;padding:12px;border-radius:10px;border:none;background:#5a9e6a;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Klee One',cursive">⭕ 合ってた</button>
        <button onclick="listenSelfJudge(false)" style="flex:1;padding:12px;border-radius:10px;border:none;background:#c04040;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Klee One',cursive">❌ 違った</button>

  </div>

  <!-- 聞き流し -->
  <div class="card">
    <div class="card-title">▶️ 聞き流し</div>
    <p style="font-size:13px;color:#a08070;margin-bottom:14px">韓国語→日本語訳の順で自動再生します。ながら勉強に！</p>
    <div id="flowSetup">
      <div class="form-group">
        <label class="field-label">カテゴリ</label>
        <div class="lf-scroll" id="flowCatFilter"></div>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label class="field-label">間隔（秒）</label>
        <input type="number" id="flowInterval" value="3" min="1" max="10" style="width:80px">
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="startFlow()">再生開始</button>
      </div>
    </div>
    <div id="flowMain" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="flowProgress" style="width:0%"></div></div>
      <div class="test-counter" id="flowCounter"></div>
      <div style="text-align:center;padding:20px 0">
        <div id="flowKorean" style="font-size:28px;font-weight:800;color:#c4724a;margin-bottom:8px"></div>
        <div id="flowJapanese" style="font-size:16px;color:#a08070;min-height:24px"></div>
        <div id="flowStatus" style="font-size:12px;color:#c0a898;margin-top:8px"></div>

      <div style="text-align:center;padding:20px 0;color:#a08070;font-size:15px">🎉 再生完了！</div>

        <button class="btn-primary" onclick="resetFlow()">もう一度</button>
        <button class="btn-ghost" onclick="switchTab('vocab')">単語帳へ</button>
      </div>
    </div>
  </div>

</div>
</main>

<div id="toast"></div>

<script>
const STORAGE_KEY = 'korean_vocab_list';
const CAT_KEY = 'korean_categories';

const LEVELS = [
  {key:'unset', label:'未設定', emoji:'⬜', color:'#a08070', bg:'#ede8e3'},
  {key:'hard',  label:'むずかしい', emoji:'❌', color:'#e87878', bg:'#ffe8e8'},
  {key:'unsure',label:'あやしい',   emoji:'⚠️', color:'#e8b830', bg:'#fff8d6'},
  {key:'ok',    label:'覚えた',     emoji:'🟢', color:'#5aaa70', bg:'#e8f8e8'},
];
const DEFAULT_CATS = ['マイ単語','TOPIK 3級','TOPIK 4級','推し','ドラマ・映画'];
function getLv(key){ return LEVELS.find(l=>l.key===key)||LEVELS[0]; }

// ===== State =====
let words = [];
let categories = [];
let editId = null;
let currentPage = 1;
const PAGE_SIZE = 30;
let filterLevel = 'all';
let filterCat = 'all';
let testMode = 'ja2ko';
let testLevelFilter = 'all';
let testCatFilter = 'all';
let testPool = [];
let testIdx = 0;
let testScore = {correct:0,wrong:0};
let wrongList = [];
let testAnswer = '';
let testPhase = 'question';

function loadWords(){ try{ const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):[]; }catch{return[];} }
function loadCats(){ try{ const r=localStorage.getItem(CAT_KEY); return r?JSON.parse(r):[...DEFAULT_CATS]; }catch{return[...DEFAULT_CATS];} }
function saveWords(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(words)); }catch{} }
function saveCats(){ try{ localStorage.setItem(CAT_KEY,JSON.stringify(categories)); }catch{} }

window.addEventListener('load',()=>{
  words=loadWords(); categories=loadCats();
  document.getElementById('fDate').value=today();
  if(window.speechSynthesis){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.addEventListener('voiceschanged',()=>window.speechSynthesis.getVoices());
  }
  renderAll();
});

function today(){ return new Date().toISOString().slice(0,10); }

// ===== Tabs =====
function switchTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  ['vocab','test','record','notes','listen'].forEach((t,i)=>{ if(t===id) document.querySelectorAll('.tab-btn')[i].classList.add('active'); });
  if(id==='vocab') renderAll();
  if(id==='record') renderRecord();
  if(id==='test'){ renderTestCatFilters(); renderLevelFilters(); }
  if(id==='listen') renderListen();
  if(id==='notes'){
    if(openMonths.size===0 && notes_data.length>0){
      const latest=notes_data.map(n=>n.date?n.date.slice(0,7):'不明').sort().reverse()[0];
      openMonths.add(latest);
    }
    renderNotes();
  }
}

// ===== Toast =====
let toastTimer;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=type==='err'?'#7f1d1d':'#166534';
  t.style.display='block'; t.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.style.display='none',300); },2200);
}

function renderAll(){
  document.getElementById('wordCount').textContent=words.length+'語';
  renderCatScroll();
  renderCatSelect();
  renderCatList();
  renderLevelSummary();
  renderWords();
}

// ===== Categories =====
function renderCatScroll(){
  const el=document.getElementById('catScroll');
  const allActive=filterCat==='all';
  let html=`<button class="cat-chip${allActive?' active':''}" onclick="setCatFilter('all')">すべて</button>`;
  categories.forEach(c=>{
    const active=filterCat===c;
    html+=`<button class="cat-chip${active?' active':''}" onclick="setCatFilter('${esc(c)}')">${esc(c)}</button>`;
  });
  el.innerHTML=html;
}

function renderCatSelect(){
  const sel=document.getElementById('fCategory');
  const cur=sel.value;
  sel.innerHTML=categories.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  if(cur && categories.includes(cur)) sel.value=cur;
}

function renderCatList(){
  const el=document.getElementById('catList');
  if(categories.length===0){ el.innerHTML='<span style="color:#c0a898;font-size:12px">カテゴリがありません</span>'; return; }
  el.innerHTML=categories.map((c,i)=>`
    <div class="cat-item" draggable="true"
      ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="dragDrop(event,${i})" ondragend="dragEnd()">
      <span style="color:#c0a898;font-size:16px;cursor:grab;padding:0 4px">⠿</span>
      <span style="font-size:13px;flex:1">${esc(c)}</span>
      <button onclick="moveCat(${i},-1)" style="background:transparent;border:none;color:#b09080;cursor:pointer;font-size:14px;padding:0 4px" ${i===0?'disabled':''}>▲</button>
      <button onclick="moveCat(${i},1)" style="background:transparent;border:none;color:#b09080;cursor:pointer;font-size:14px;padding:0 4px" ${i===categories.length-1?'disabled':''}>▼</button>
      <button onclick="deleteCategory('${esc(c)}')" style="background:transparent;border:none;color:#c0a898;cursor:pointer;font-size:16px;padding:0 4px;line-height:1">×</button>
    </div>`).join('');
}

function moveCat(idx,dir){
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=categories.length) return;
  const tmp=categories[idx]; categories[idx]=categories[newIdx]; categories[newIdx]=tmp;
  saveCats(); renderAll();
}

let dragIdx=null;
function dragStart(e,idx){ dragIdx=idx; }
function dragOver(e){ e.preventDefault(); }
function dragDrop(e,idx){
  e.preventDefault();
  if(dragIdx===null||dragIdx===idx) return;
  const moved=categories.splice(dragIdx,1)[0];
  categories.splice(idx,0,moved);
  dragIdx=null; saveCats(); renderAll();
}
function dragEnd(){ dragIdx=null; }


function addCategory(){
  const input=document.getElementById('newCatInput');
  const name=input.value.trim();
  if(!name){ showToast('カテゴリ名を入力してください','err'); return; }
  if(categories.includes(name)){ showToast('同じ名前のカテゴリがあります','err'); return; }
  categories.push(name); saveCats(); input.value='';
  renderAll(); showToast(`「${name}」を追加しました ✓`);
}

function deleteCategory(name){
  if(!confirm(`「${name}」を削除しますか？\n（このカテゴリの単語は「マイ単語」に移動します）`)) return;
  categories=categories.filter(c=>c!==name);
  words=words.map(w=>w.category===name?{...w,category:categories[0]||'マイ単語'}:w);
  if(filterCat===name) filterCat='all';
  if(testCatFilter===name) testCatFilter='all';
  saveCats(); saveWords(); renderAll(); showToast(`「${name}」を削除しました`,'err');
}

function setCatFilter(cat){
  filterCat=cat; currentPage=1; renderAll();
}

// ===== Level Summary =====
function getCounts(){
  const c={unset:0,hard:0,unsure:0,ok:0};
  words.forEach(w=>{ const k=w.level||'unset'; c[k]=(c[k]||0)+1; });
  return c;
}

function renderLevelSummary(){
  const counts=getCounts();
  const el=document.getElementById('levelSummary');
  el.innerHTML=LEVELS.map(l=>{
    const cnt=l.key==='all'?words.length:(counts[l.key]||0);
    const active=filterLevel===l.key;
    const border=active?`1.5px solid ${l.color}`:'1.5px solid #e0d8d0';
    const bg=active&&l.bg?l.bg:'#f7f3ef';
    return `<button class="level-chip" style="border:${border};background:${bg}" onclick="toggleLevelFilter('${l.key}')">
      <span>${l.emoji}</span><span style="color:${l.color}">${cnt}</span>
    </button>`;
  }).join('');
}

function toggleLevelFilter(key){
  filterLevel=filterLevel===key?'all':key;
  currentPage=1; renderLevelSummary(); renderWords();
}

// ===== Words =====
function renderWords(resetPage){
  if(resetPage) currentPage=1;
  const search=document.getElementById('searchInput').value;
  const list=document.getElementById('wordList');
  const filtered=words.filter(w=>{
    const ms=w.korean.includes(search)||w.japanese.includes(search)||(w.memo||'').includes(search);
    const ml=filterLevel==='all'||(w.level||'unset')===filterLevel;
    const mc=filterCat==='all'||(w.category||categories[0]||'マイ単語')===filterCat;
    return ms&&ml&&mc;
  }).slice().reverse();

  if(filtered.length===0){ list.innerHTML='<div class="empty">単語がありません。</div>'; return; }

  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  if(currentPage>totalPages) currentPage=totalPages;
  const start=(currentPage-1)*PAGE_SIZE;
  const paged=filtered.slice(start,start+PAGE_SIZE);

  list.innerHTML=paged.map(w=>{
    const lv=getLv(w.level||'unset');
    const stamps=LEVELS.slice(1).map(l=>{
      const active=(w.level||'unset')===l.key;
      const activeBg=active?`background:${l.bg};border:1.5px solid ${l.color};padding:2px 5px;`:'';
      return `<button class="stamp-btn${active?' active':''}" style="${activeBg}" onclick="toggleLevel(${w.id},'${l.key}')" title="${l.label}">${l.emoji}</button>`;
    }).join('');
    const cat=w.category||categories[0]||'マイ単語';
    return `<div style="background:${lv.bg};border-radius:16px;padding:14px 16px;border:1px solid ${lv.color}88;border-left:6px solid ${lv.color};box-shadow:0 2px 8px rgba(180,140,120,.1);margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
        <span style="font-size:24px;font-weight:800;color:#c4724a;letter-spacing:-.01em">${esc(w.korean)}</span>
        <button class="speak-btn" onclick="speakWord('${esc(w.korean)}',${w.id})" id="spk-${w.id}">🔈</button>
        <span style="font-size:13px;color:#7a6050;font-weight:600">${esc(w.japanese)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;background:rgba(196,114,74,.15);color:#c4724a;border:1px solid rgba(196,114,74,.25)">${esc(cat)}</span>
        <span style="font-size:11px;color:#a08070;background:rgba(0,0,0,.05);padding:3px 8px;border-radius:6px;border:1px solid rgba(0,0,0,.08);font-weight:600">${w.date||'—'}</span>
      </div>
      ${w.memo?`<div style="font-size:13px;color:#a08070;margin-bottom:8px;font-weight:600">📝 ${esc(w.memo)}</div>`:''}
      <div style="display:flex;align-items:center;gap:4px;padding-top:8px;border-top:1px solid rgba(0,0,0,.08)">
        ${stamps}
        <div style="flex:1"></div>
        <button style="background:rgba(160,128,112,.15);color:#8a6050;border:1px solid rgba(160,128,112,.25);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:600;font-family:'Klee One',cursive" onclick="editWord(${w.id})">編集</button>
        <button style="background:rgba(200,80,60,.15);color:#c05040;border:1px solid rgba(200,80,60,.25);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:600;font-family:'Klee One',cursive" onclick="deleteWord(${w.id})">削除</button>
      </div>
    </div>`;
  }).join('');

  // paging controls
  if(totalPages>1){
    let pagingHtml='<div class="paging-row">';
    pagingHtml+=`<button class="page-btn" onclick="changePage(1)" ${currentPage===1?'disabled':''}>«</button>`;
    pagingHtml+=`<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    pagingHtml+=`<span class="page-info">${currentPage} / ${totalPages}ページ（${filtered.length}語）</span>`;
    pagingHtml+=`<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
    pagingHtml+=`<button class="page-btn" onclick="changePage(${totalPages})" ${currentPage===totalPages?'disabled':''}>»</button>`;
    pagingHtml+='</div>';
    list.innerHTML+=pagingHtml;
  } else {
    list.innerHTML+=`<div style="text-align:center;font-size:15px;color:#b09080;margin-top:12px;font-weight:700">${filtered.length}語</div>`;
  }
}

function changePage(p){
  currentPage=p;
  renderWords();
  window.scrollTo(0,300);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== CRUD =====
function handleSave(){
  const korean=document.getElementById('fKorean').value.trim();
  const japanese=document.getElementById('fJapanese').value.trim();
  const memo=document.getElementById('fMemo').value.trim();
  const category=document.getElementById('fCategory').value||categories[0]||'マイ単語';
  const date=document.getElementById('fDate').value;
  if(!korean||!japanese){ showToast('韓国語と日本語は必須です','err'); return; }
  if(editId!==null){
    words=words.map(w=>w.id===editId?{...w,korean,japanese,memo,category,date}:w);
    showToast('更新しました ✓'); editId=null;
    document.getElementById('formTitle').textContent='＋ 単語を追加';
    document.getElementById('saveBtn').textContent='追加する';
    document.getElementById('cancelBtn').style.display='none';
  } else {
    words.push({id:Date.now(),korean,japanese,memo,category,date,level:'unset',addedAt:new Date().toISOString()});
    showToast('追加しました ✓');
    recordActivity();
  }
  document.getElementById('fKorean').value='';
  document.getElementById('fJapanese').value='';
  document.getElementById('fMemo').value='';
  document.getElementById('fDate').value=today();

  saveWords(); renderAll();
}

function editWord(id){
  const w=words.find(x=>x.id===id); if(!w) return;
  document.getElementById('fKorean').value=w.korean;
  document.getElementById('fJapanese').value=w.japanese;
  document.getElementById('fMemo').value=w.memo||'';
  document.getElementById('fDate').value=w.date||today();
  renderCatSelect();
  if(w.category) document.getElementById('fCategory').value=w.category;
  editId=id;
  document.getElementById('formTitle').textContent='✏️ 編集中';
  document.getElementById('saveBtn').textContent='更新する';
  document.getElementById('cancelBtn').style.display='';
  switchTab('vocab'); window.scrollTo(0,0);
}

function cancelEdit(){
  editId=null;
  document.getElementById('formTitle').textContent='＋ 単語を追加';
  document.getElementById('saveBtn').textContent='追加する';
  document.getElementById('cancelBtn').style.display='none';
  ['fKorean','fJapanese','fMemo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fDate').value=today();
}

function deleteWord(id){
  words=words.filter(w=>w.id!==id);
  saveWords(); renderAll(); showToast('削除しました','err');
}

function toggleLevel(id,key){
  words=words.map(w=>{
    if(w.id!==id) return w;
    const newLevel=(w.level||'unset')===key?'unset':key;
    // unsetに戻すときはフラグもリセット
    if(newLevel==='unset') return {...w,level:'unset',ok_ja2ko:false,ok_ko2ja:false};
    return {...w,level:newLevel};
  });
  saveWords(); renderAll();
}

// ===== Backup =====
function exportData(){
  const json=JSON.stringify({version:2,exportedAt:new Date().toISOString(),categories,words},null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download=`korean-vocab-${today()}.json`;
  a.click(); showToast('エクスポートしました 📥');
}

function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      const imported=data.words||data;
      if(!Array.isArray(imported)) throw new Error();
      // merge categories
      if(data.categories) data.categories.forEach(c=>{ if(!categories.includes(c)) categories.push(c); });
      const ids=new Set(words.map(w=>w.id));
      const newW=imported.filter(w=>!ids.has(w.id));
      words=[...words,...newW];
      saveCats(); saveWords(); renderAll(); showToast(`${newW.length}語をインポートしました ✓`);
    }catch{ showToast('ファイルが読み込めませんでした','err'); }
  };
  reader.readAsText(file); e.target.value='';
}



// ===== Speech =====
function speakKorean(text,onEnd){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=0.9;
  const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('ko'));
  if(v) u.voice=v;
  if(onEnd) u.onend=onEnd;
  window.speechSynthesis.speak(u);
}
function speakWord(text,id){
  const btn=document.getElementById('spk-'+id);
  if(btn) btn.textContent='🔊';
  speakKorean(text,()=>{ if(btn) btn.textContent='🔈'; });
}
function speakTest(){
  const cur=testPool[testIdx]; if(!cur) return;
  const btn=document.getElementById('testSpeakBtn');
  btn.textContent='🔊'; speakKorean(cur.korean,()=>btn.textContent='🔈');
}
function speakResult(){
  const btn=document.getElementById('resultSpeakBtn');
  btn.textContent='🔊'; speakKorean(testAnswer,()=>btn.textContent='🔈');
}

// ===== Test =====
function setTestMode(mode){
  testMode=mode;
  document.getElementById('modeJK').classList.toggle('active',mode==='ja2ko');
  document.getElementById('modeKJ').classList.toggle('active',mode==='ko2ja');
}

function renderTestCatFilters(){
  const el=document.getElementById('testCatFilters');
  const total=words.length;
  let html=`<button class="lf-btn${testCatFilter==='all'?' active':''}" onclick="setTestCatFilter('all')">すべて（${total}）</button>`;
  categories.forEach(c=>{
    const cnt=words.filter(w=>(w.category||categories[0]||'マイ単語')===c).length;
    const active=testCatFilter===c;
    html+=`<button class="lf-btn${active?' active':''}" onclick="setTestCatFilter('${esc(c)}')">${esc(c)}（${cnt}）</button>`;
  });
  el.innerHTML=html;
  updateTestCount();
}

function setTestCatFilter(cat){
  testCatFilter=cat; renderTestCatFilters(); renderLevelFilters();
}

function renderLevelFilters(){
  // カテゴリフィルター適用後の習熟度カウント
  const filteredWords=words.filter(w=>testCatFilter==='all'||(w.category||categories[0]||'マイ単語')===testCatFilter);
  const counts={unset:0,hard:0,unsure:0,ok:0};
  filteredWords.forEach(w=>{ const k=w.level||'unset'; counts[k]=(counts[k]||0)+1; });
  const el=document.getElementById('levelFilters');
  const allBtn=`<button class="lf-btn${testLevelFilter==='all'?' active':''}" onclick="setTestLevelFilter('all')">すべて（${getTestPool().length}）</button>`;
  const lvBtns=LEVELS.slice(1).map(l=>{
    const active=testLevelFilter===l.key;
    return `<button class="lf-btn${active?' active':''}" onclick="setTestLevelFilter('${l.key}')">${l.emoji} ${l.label}（${counts[l.key]||0}）</button>`;
  }).join('');
  el.innerHTML=allBtn+lvBtns;
  updateTestCount();
}

function setTestLevelFilter(key){
  testLevelFilter=testLevelFilter===key?'all':key; renderLevelFilters();
}

function getTestPool(){
  return words.filter(w=>{
    const mc=testCatFilter==='all'||(w.category||categories[0]||'マイ単語')===testCatFilter;

function selfJudge(isOk){
  const cur=testPool[testIdx];
  testScore.correct+=isOk?1:0; testScore.wrong+=isOk?0:1;
  if(!isOk) wrongList.push({...cur,yourAnswer:'（自己採点：不正解）'});
  // 習熟度更新（両方正解→🟢、片方正解→⚠️）
  if(isOk){
    words=words.map(w=>{
      if(w.id!==cur.id) return w;
      const modeKey=testMode==='ja2ko'?'ok_ja2ko':'ok_ko2ja';
      const updated={...w,[modeKey]:true};
      if(updated.ok_ja2ko===true && updated.ok_ko2ja===true){
        updated.level='ok';
      } else {
        updated.level='unsure';
      }
      return updated;
    });
  } else {
    words=words.map(w=>w.id===cur.id?{...w,level:'hard',ok_ja2ko:false,ok_ko2ja:false}:w);
  }
  saveWords();
  const banner=document.getElementById('resultBanner');
  banner.className='result-banner '+(isOk?'correct':'wrong');
  banner.style.background='';
  document.getElementById('resultText').textContent=isOk?'⭕ 正解！':'❌ 不正解';
  document.getElementById('selfJudgeRow').style.display='none';
  document.getElementById('nextBtnRow').style.display='';
}

function checkAnswer(){
  const cur=testPool[testIdx];
  const ans=document.getElementById('testInput').value.trim();
  const correct=(testMode==='ja2ko'?cur.korean:cur.japanese).trim();
  testAnswer=correct;
  // 漢字→ひらがな変換（カタカナもひらがなに統一して比較）
  const toHira=s=>s.replace(/[\u30A1-\u30F6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));
  const norm=s=>toHira(s.replace(/\s/g,'')).toLowerCase();
  // 「・」「/」「、」で区切られた訳のどれか1つでも正解
  const variants=correct.split(/[・\/、]/).map(s=>s.trim()).filter(s=>s.length>0);
  const isOk=variants.some(v=>norm(ans)===norm(v))||norm(ans)===norm(correct);
  testScore.correct+=isOk?1:0; testScore.wrong+=isOk?0:1;
  if(!isOk) wrongList.push({...cur,yourAnswer:ans});
  // 習熟度更新（両方正解→🟢、片方正解→⚠️）
  if(isOk){
    words=words.map(w=>{
      if(w.id!==cur.id) return w;
      const modeKey=testMode==='ja2ko'?'ok_ja2ko':'ok_ko2ja';
      const updated={...w,[modeKey]:true};
      if(updated.ok_ja2ko===true && updated.ok_ko2ja===true){
        updated.level='ok';
      } else {
        updated.level='unsure';
      }
      return updated;
    });
  } else {
    words=words.map(w=>w.id===cur.id?{...w,level:'hard',ok_ja2ko:false,ok_ko2ja:false}:w);
  }
  saveWords();
  document.getElementById('testInput').disabled=true;
  const banner=document.getElementById('resultBanner');
  banner.className='result-banner '+(isOk?'correct':'wrong');
  banner.style.display='flex';
  document.getElementById('resultText').textContent=isOk?'⭕ 正解！':'❌ 不正解 → '+correct;
  const rspk=document.getElementById('resultSpeakBtn');
  rspk.style.display=''; rspk.textContent='🔈';
  document.getElementById('nextBtnRow').style.display='';
  document.getElementById('testActionBtn').style.display='none';
  testPhase='result';
}

function renderWeekGraph(){
  const activity=loadActivity();
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  const counts=days.map(d=>activity[d]||0);
  const max=Math.max(...counts,1);
  const dayNames=['日','月','火','水','木','金','土'];

  const bars=days.map((d,i)=>{
    const h=Math.round((counts[i]/max)*70)+4;
    const isToday=d===today();
    const color=isToday?'#d4826a':'#e8d5cc';
    return `<div class="graph-bar" style="height:${h}px;background:${color}" title="${counts[i]}回"></div>`;
  }).join('');

  const labels=days.map((d,i)=>{
    const dn=new Date(d+'T00:00:00');
    const isToday=d===today();
    return `<span style="${isToday?'color:#d4826a;font-weight:700':''}">${ dayNames[dn.getDay()]}</span>`;
  }).join('');

  const total=counts.reduce((a,b)=>a+b,0);

  document.getElementById('weekGraph').innerHTML=bars;
  document.getElementById('weekLabels').innerHTML=labels;
  document.getElementById('weekTotal').textContent=`今週の操作数：${total}回`;
}

function renderNotes(){
  const el=document.getElementById('noteList');
  if(notes_data.length===0){
    el.innerHTML='<div class="empty">レッスンノートがありません。<br>レッスン後に気づきを記録しましょう！</div>';
    return;
  }
  const sorted=[...notes_data].sort((a,b)=>b.date.localeCompare(a.date));

  // 月別にグループ化
  const byMonth={};
  sorted.forEach(n=>{
    const m=n.date?n.date.slice(0,7):'不明';
    if(!byMonth[m]) byMonth[m]=[];
    byMonth[m].push(n);
  });

  el.innerHTML=Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([month,notes])=>{
    const [y,m]=month.split('-');
    const label=month==='不明'?'日付なし':`${y}年${parseInt(m)}月`;
    const isOpen=openMonths.has(month);
    const notesHtml=notes.map(n=>{
      const dayWords=words.filter(w=>w.date===n.date);
      const wordChips=dayWords.length>0
        ?'<div class="note-words"><div class="note-words-title">📚 この日追加した単語（'+dayWords.length+'語）</div>'
          +dayWords.map(w=>`<span class="note-word-chip">${esc(w.korean)}</span>`).join('')+'</div>'
        :'';
      return `<div class="note-card">
        <div class="note-header">
          <div>
            <div class="note-date">${n.date}</div>
            ${n.theme?`<div class="note-theme">${esc(n.theme)}</div>`:''}
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-sm" onclick="editNote(${n.id})">編集</button>
            <button class="btn-sm btn-danger" onclick="deleteNote(${n.id})">削除</button>
          </div>
        </div>
        ${n.body?`<div class="note-body">${esc(n.body)}</div>`:''}
        ${wordChips}
      </div>`;
    }).join('');

    return `<div style="margin-bottom:10px">
      <button onclick="toggleMonth('${month}')" style="width:100%;display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0d8d0;border-radius:14px;padding:12px 16px;cursor:pointer;font-family:'Klee One',cursive;font-weight:700;font-size:15px;color:#7a4030;box-shadow:0 2px 6px rgba(180,140,120,.08)">
        <span>${isOpen?'▼':'▶'} ${label}</span>
        <span style="font-size:13px;color:#b09080;font-weight:600">${notes.length}回</span>
      </button>
      ${isOpen?`<div style="margin-top:8px">${notesHtml}</div>`:''}
    </div>`;
  }).join('');
}

let openMonths=new Set();
function toggleMonth(month){
  if(openMonths.has(month)) openMonths.delete(month);
  else openMonths.add(month);
  renderNotes();
}

const STREAK_KEY='korean_streak';
const ACTIVITY_KEY='korean_activity';

function loadStreak(){ try{ return JSON.parse(localStorage.getItem(STREAK_KEY)||'{"current":0,"best":0,"lastDate":""}'); }catch{return{current:0,best:0,lastDate:''}; } }
function saveStreak(s){ try{ localStorage.setItem(STREAK_KEY,JSON.stringify(s)); }catch{} }
function loadActivity(){ try{ return JSON.parse(localStorage.getItem(ACTIVITY_KEY)||'{}'); }catch{return{}; } }
function saveActivity(a){ try{ localStorage.setItem(ACTIVITY_KEY,JSON.stringify(a)); }catch{} }

function recordActivity(){
  const t=today();
  const streak=loadStreak();
  const activity=loadActivity();
  activity[t]=(activity[t]||0)+1;
  saveActivity(activity);
  if(streak.lastDate===t) return; // 今日すでに記録済み
  const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yStr=yesterday.toISOString().slice(0,10);
  if(streak.lastDate===yStr){
    streak.current+=1;
  } else if(streak.lastDate!==t){
    streak.current=1;
  }
  streak.best=Math.max(streak.best,streak.current);
  streak.lastDate=t;
  saveStreak(streak);
}

function renderStreak(){
  const streak=loadStreak();
  const el=document.getElementById('streakBox');
  if(!el) return;
  const isToday=streak.lastDate===today();
  el.innerHTML=`
    <div class="streak-fire">${isToday?'🔥':'🌙'}</div>
    <div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <div class="streak-num">${streak.current}</div>
        <div class="streak-label">日連続！</div>
      </div>
      <div class="streak-best">🏆 最高記録 ${streak.best}日</div>
    </div>
    <div style="margin-left:auto;text-align:right">
      <div style="font-size:11px;color:rgba(255,255,255,.7)">${isToday?'✅ 今日達成':'今日まだ！'}</div>
    </div>`;
}

  if(listenWrong.length===0){ ws.innerHTML=''; return; }
  ws.innerHTML='<div class="wrong-title">❌ 間違えた単語</div>'+
    listenWrong.map(w=>`<div class="wrong-item"><div><b>${esc(w.japanese)}</b> → 正解：<span style="color:#5a9e6a">${esc(w.korean)}</span></div>${w.yourAnswer?`<div class="your-ans">あなた：${esc(w.yourAnswer)}</div>`:''}</div>`).join('');
}

function resetListenQuiz(){
  document.getElementById('listenQuizDone').style.display='none';
  document.getElementById('listenQuizMain').style.display='none';
  document.getElementById('listenQuizSetup').style.display='';
  renderListenCatFilter();
}

// ===== 聞き流し =====
function renderFlowCatFilter(){
  const el=document.getElementById('flowCatFilter');
  if(!el) return;
  let html=`<button class="lf-btn${flowCatFilter==='all'?' active':''}" onclick="setFlowCat('all')">すべて（${words.length}）</button>`;
  categories.forEach(c=>{
    const cnt=words.filter(w=>(w.category||categories[0]||'マイ単語')===c).length;
    html+=`<button class="lf-btn${flowCatFilter===c?' active':''}" onclick="setFlowCat('${esc(c)}')">${esc(c)}（${cnt}）</button>`;
  });
  el.innerHTML=html;
}

function setFlowCat(cat){ flowCatFilter=cat; renderFlowCatFilter(); }
function getFlowPool(){ return words.filter(w=>flowCatFilter==='all'||(w.category||categories[0]||'マイ単語')===flowCatFilter); }

function startFlow(){
  const pool=getFlowPool();
  if(pool.length===0){ showToast('対象の単語がありません','err'); return; }
  flowPool=[...pool].sort(()=>Math.random()-.5);
  flowIdx=0;
  document.getElementById('flowSetup').style.display='none';
  document.getElementById('flowDone').style.display='none';
  document.getElementById('flowMain').style.display='';
  playFlowWord();
}

function playFlowWord(){
  if(flowIdx>=flowPool.length){ stopFlow(); document.getElementById('flowDone').style.display=''; return; }
  const cur=flowPool[flowIdx];
  const interval=parseInt(document.getElementById('flowInterval').value)||3;
  document.getElementById('flowProgress').style.width=(flowIdx/flowPool.length*100)+'%';
  document.getElementById('flowCounter').textContent=(flowIdx+1)+' / '+flowPool.length;
  document.getElementById('flowKorean').textContent=cur.korean;
  document.getElementById('flowJapanese').textContent='';
  document.getElementById('flowStatus').textContent='▶ 再生中…';
  // 韓国語を読み上げ
  speakKorean(cur.korean,()=>{
    document.getElementById('flowStatus').textContent='…';
    flowTimer=setTimeout(()=>{
      // 日本語訳を表示＋読み上げ
      if(!document.getElementById('flowMain').style.display==='none') return;
      document.getElementById('flowJapanese').textContent=cur.japanese;
      document.getElementById('flowStatus').textContent='🇯🇵 '+cur.japanese;
      // 次の単語へ
      flowTimer=setTimeout(()=>{
        flowIdx++;
        playFlowWord();
      }, interval*1000);
    }, 800);
  });
}

function stopFlow(){
  if(flowTimer){ clearTimeout(flowTimer); flowTimer=null; }
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('flowMain').style.display='none';
  document.getElementById('flowSetup').style.display='';
}

function resetFlow(){
  document.getElementById('flowDone').style.display='none';
  document.getElementById('flowMain').style.display='none';
  document.getElementById('flowSetup').style.display='';
  renderFlowCatFilter();
}

</script>
</body>
